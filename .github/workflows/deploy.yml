name: Deploy cli-solanize

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & restart cli-solanize
    runs-on: ubuntu-latest
    timeout-minutes: 30        # Rust builds can take a while

    steps:
      - name: SSH into VPS and run cli-solanize deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 28m
          script: |
            sudo bash /opt/solanize/src/cli-solanize/deploy.sh
